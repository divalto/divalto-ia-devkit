# Schema : Module ERP Divalto
# Un Module = grand domaine fonctionnel (ex : DAV Achat-Vente, COMPTA Comptabilite)
# Porte l'identite + le narratif metier de haut niveau + les bases (GTF*/CCF*) qu'il regroupe.

kind: module
version: 0.1

required_fields:
  - code             # string, 3-8 chars, ex: "DAV", "COMPTA", "GS"
  - label            # string, nom lisible, ex: "Achat-Vente"
  - prefix           # string, prefixe canonique, ex: "GTF", "CCF"
  - status           # enum: draft | stable | deprecated

optional_fields:
  - domain           # string, domaine fonctionnel plus large, ex: "Gestion commerciale"
  - description      # string, 1-2 paragraphes, role du module dans l'ERP
  - business_context # string, narratif metier pour la couche "consultants"
  - bases            # list[string], codes des bases du module, ex: ["GTFDOS","GTFPCF",...]
  - entities         # list[string], codes des entites portees, ex: ["SOC","CLI","FOU",...]
  - depends_on       # list[string], autres modules dont celui-ci depend, ex: ["COMPTA"]
  - integrates_with  # list[string], modules avec integration bidirectionnelle
  - owner            # string, equipe responsable, ex: "Equipe R&D DAV"
  - last_reviewed    # date ISO, ex: "2026-04-21"
  - a_verifier       # list[string], items ouverts

sources:
  # Reference locale au skill (pas de lien vers workspace externe : skill autonome)
  - reference/modules-erp-summary.md   # liste des modules + prefixes + dicos

rendering_layers:
  # Quelle partie du module va dans quelle couche de lecture
  business:   [label, domain, description, business_context, depends_on, integrates_with]
  schema:     [code, prefix, bases, entities, depends_on, integrates_with]
  technical:  [code, prefix, bases, entities, owner, status, last_reviewed, a_verifier]
